name: Deadline Reminders

on:
  schedule:
    # 09:00 UTC daily (adjust to your timezone preference)
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase python-dotenv resend

      - name: Send deadline reminders
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL:    ${{ secrets.DIGEST_FROM_EMAIL }}
          APP_URL:              ${{ secrets.APP_URL }}
          # SMTP fallback (optional)
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:     ${{ secrets.SMTP_FROM }}
        run: python scripts/send_deadline_reminders.py
